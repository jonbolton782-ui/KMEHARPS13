<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Orrs Hill Weather Station — Tablet</title>

  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#071018;
  --card:#0b2a33;
  --muted:#9fb6c2;
  --accent:#1fb6b6;
  --accent-2:#ffd166;
  --text:#e6f7f7;
  --danger:#ff6b6b;
  --glass: rgba(255,255,255,0.03);
  --temp-accent:#39a0ff;
  --now-accent:#ff8c42;
  --base-temp-size:96px;
}

/* Page / container */
html,body{
  height:100%;
  margin:0;
  background:linear-gradient(180deg,var(--bg),#04202a);
  color:var(--text);
  font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;
  font-size:14px;
}

.topGrid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.gridCard {
  background: rgba(255,255,255,0.08);
  border-radius: 10px;
  padding: 10px;
  min-height: 0;
  aspect-ratio: 1 / 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.cardIcon {
  width: 72px;
  height: 72px;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

.cardLabel {
  margin-top: 6px;
  font-size: 1.1rem;
  text-align: center;
  line-height: 1.2;
}

/* Ensure all SVGs scale consistently */
.gridCard svg {
  width: 72px;
  height: 72px;
}


.pressureCard {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 5px; /* Tighter padding to accommodate a larger gauge */
}

.pressureRing {
  fill: none;
  stroke: rgba(255,255,255,0.25);
  stroke-width: 6;
}

.pressureValue {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 1.4rem;
  font-weight: 600;
  color: white;
}

.pressureTrendArrow {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  width: 0;
  height: 0;
  display: none;
  z-index: 1;
}

.pressureCard .cardIcon, .pressureCard svg {
  width: 94px;
  height: 94px;
}

.pressureTrendArrow[aria-label="Pressure rising"] {
  top: 26px; /* Offset adjusted for 94px gauge */
}
.pressureTrendArrow[aria-label="Pressure falling"] {
  top: 68px; /* Offset adjusted for 94px gauge */
}


.sunCard {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.sunIcon {
  font-size: 2rem;
  margin-bottom: 0;
}

.sunCard .cardLabel {
  margin-top: 0;
}

.moonCard .cardLabel {
  margin-top: -10px;
}

.sunCard .sunIconSvg {
  display: block;
  margin-bottom: -6px;
}

.sunTime {
  font-size: 1.4rem;
  font-weight: 600;
}

.sunLabel {
  font-size: 0.9rem;
  opacity: 0.8;
}

.sunIconSvg {
  width: 48px;
  height: 48px;
  display: block;
}

.humidityIconSvg {
  width: 48px;
  height: 48px;
  display: block;
}

#humidityDroplet {
  filter: drop-shadow(0 0 4px rgba(0, 100, 255, 0.4));
}




/* Group top row + sparkline so sparkline width = top row width */
.topBlock{
  display:flex;
  width:100%;
}

/* Ensure left column aligns to start so topBlock controls sparkline width */
.leftContentWrap{
  display:flex;
  flex-direction:column;
  align-items:flex-start; /* keep children left-aligned */
  width:100%;
  min-width:0;
  box-sizing:border-box;
}

/* Sparkline fills the topBlock width (not the whole left column) */
.sparkFull{
  width:100%;
  min-width:100%;
  box-sizing:border-box;
}


.container{
  /* 952px total content width + 24px horizontal padding */
  max-width: 976px;
  margin:14px auto;
  padding:12px;
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
}
.card{
  background:linear-gradient(180deg,var(--card),#06282f);
  border-radius:12px;
  padding:12px;
  box-shadow:0 8px 28px rgba(0,0,0,0.45);
  color:var(--text);
  box-sizing:border-box;
}

/* Top band: stable two-column layout using grid */
.topBand{
  display:grid;
  /* Left column expands but caps at 720px to prevent huge gaps on wide screens */
  /* Total content: 720 + 12 (gap) + 220 = 952px */
  grid-template-columns: minmax(min-content, 720px) 220px;
  justify-content: start;
  gap:12px;
  align-items:start;
  box-sizing:border-box;
}

/* Left column */
.leftBandRow{
  display:flex;
  flex-direction:column;
  gap:10px;
  min-width:0; /* critical so children can shrink */
  box-sizing:border-box;
}

/* Left content: fill the left grid column */
.leftContentWrap{
  display:flex;
  flex-direction:column;
  width:100%;
  min-width:0;
  box-sizing:border-box;
}

/* Top row limiter (wraps the topRowItems and sparkline) */
.topRowLimiter{
  display:inline-flex;
  flex-direction:column;
  gap:12px;
  align-items:flex-start;
  justify-content:flex-start;
  width:max-content;
  min-width:0;
  box-sizing:border-box;
}

/* Top row inside left block: four items in a row */
.topRowItems{
  display:flex;
  gap:16px;
  align-items:center;
  justify-content:flex-start;
  flex-wrap:nowrap;
  min-width:0;
  flex:0 1 auto;
  width:max-content;
  box-sizing:border-box;
}

.conditionWrap{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  flex:0 0 140px;
  min-width:0;
  padding:10px 8px;
  gap:6px;
  box-sizing:border-box;
}

.conditionIcon{
  width:92px;
  height:92px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.conditionIcon svg{
  width:92px;
  height:92px;
}

.conditionText{
  text-align:center;
  font-size:0.96rem;
  line-height:1.2;
  color:var(--text);
  min-height:2.4rem;
}

/* Make each direct child of the top row shrinkable (prevents immovable blocks) */
.topRowItems > *{
  min-width:0;
  flex-shrink:1;
  box-sizing:border-box;
}

/* Specific children that historically forced width — make them flexible */
.miniCard{
  background:linear-gradient(180deg,rgba(255,255,255,0.01),rgba(0,0,0,0.02));
  padding:10px;
  border-radius:10px;
  display:flex;
  flex-direction:column;
  align-items:center;
  min-width:84px;
  flex-shrink:1;
  border:1px solid rgba(255,255,255,0.03);
  box-sizing:border-box;
}
.miniLabel{color:var(--muted);font-size:12px}
.miniVal{font-weight:800;font-size:18px}

/* Temp stack and value — allow the temp block to shrink if necessary */
.tempWrap{min-width:0;box-sizing:border-box}
.tempStack{display:flex;flex-direction:column;align-items:center;min-width:0}
.tempValue{
  font-family:Roboto,"Helvetica Neue",system-ui,-apple-system,"Segoe UI",Arial,sans-serif;
  font-weight:300;
  font-size:96px;
  line-height:96px;
  color:var(--temp-accent);
  letter-spacing:-0.01em;
  display:inline-flex;
  align-items:flex-start;
  min-width:0;
  flex-shrink:1;
  box-sizing:border-box;
}
.tempValue #airTempNum{display:inline-block;line-height:1}
.tempValue .tempUnit{
  display:inline-block;
  font-size:0.45em;
  margin-left:6px;
  transform:translateY(0);
  line-height:1;
  color:inherit;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}
.tempMeta{display:flex;flex-direction:column;gap:4px}
.summary{color:var(--muted);font-size:14px}
.feels{color:var(--muted);font-size:13px}
.feelsLikeUnder{font-size:1.8rem;opacity:0.75;margin-top:0.25rem;line-height:1.2}

/* Sparkline: always fill the left column */
.sparkFull{
  width:100%;
  box-sizing:border-box;
  justify-self: stretch;
}
.sparkWrap{
  width:100%;
  height:56px;
  border-radius:8px;
  background:linear-gradient(180deg,rgba(255,255,255,0.01),rgba(255,255,255,0.005));
  display:flex;
  align-items:center;
  padding:6px;
  box-sizing:border-box;
  position:relative;
}
#tempSpark{width:100%;height:44px;display:block}

/* Right column: fill its grid column */
.rightBand{
  width:100%;
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  box-sizing:border-box;
}

/* Make the 2x2 grid fill the rightBand vertically */
.topGrid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  grid-auto-rows:1fr;
  gap:12px;
  width:100%;
  align-items:stretch;
  justify-items:stretch;
  box-sizing:border-box;
}

/* Wind / compass */
.windWrap .miniCard{
  background:none !important; /* Keep this for transparent background */
  border:none !important;     /* Keep this for no border */
  box-shadow:none !important; /* Keep this for no shadow */
}
.compassWrap{width:150px;height:150px;position:relative;display:flex;align-items:center;justify-content:center}
.compassSvg{width:150px;height:150px}
.needle{stroke:rgba(255,255,255,0.95);stroke-width:2.2;stroke-linecap:round}

/* Rain gauge */
#rainGauge{
  width:56px;
  height:110px;
  border-radius:8px;
  position:relative;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  box-shadow:inset 0 2px 8px rgba(0,0,0,0.45);
  border:1px solid rgba(255,255,255,0.04);
  box-sizing:border-box;
}
#gaugeFill{
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  border-top-left-radius:4px;
  border-top-right-radius:4px;
  background:linear-gradient(180deg,#4fc3f7,#0288d1);
  height:0%;
}
/* 30-day rain pillar */
.rain30Pillar {
  width: 12px;
  height: 110px;
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 4px;
  position: relative;
  overflow: hidden;
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
}
#rain30Fill {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 0%;
  transition: height 1s ease-out, background-color 0.5s;
}
/* Puddle effect at the base of the gauge */
#rainGauge::after {
  content: "";
  position: absolute;
  bottom: -6px;
  left: 8px;
  right: 8px;
  height: 6px;
  background: #4fc3f7;
  border-radius: 50%;
  filter: blur(3px);
  opacity: 0;
  pointer-events: none;
  box-shadow: 0 0 10px #4fc3f7;
  transition: opacity 0.6s ease;
  z-index: 1;
}
#rainGauge.is-overflowing::after {
  opacity: 1;
  animation: puddle-pulse 2s infinite ease-in-out;
}
.overflow-mark {
  position: absolute;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(255,255,255,0.9);
  font-weight: 900;
  font-size: 22px;
  opacity: 0;
  transition: opacity 0.5s;
  z-index: 5;
  text-shadow: 0 0 8px rgba(0,0,0,0.4);
  pointer-events: none;
}
#rainGauge.is-overflowing .overflow-mark {
  animation: warning-pulse 1.5s infinite ease-in-out;
}

/* Data list / cards */
.dataList{display:flex;flex-direction:column;gap:8px}
.dataItem{display:flex;justify-content:space-between;align-items:center;padding:10px;border-radius:8px;background:linear-gradient(180deg,rgba(255,255,255,0.01),rgba(0,0,0,0.02));border:1px solid rgba(255,255,255,0.03);box-sizing:border-box}
.label{color:var(--muted);font-size:12px}
.val{font-weight:700;font-size:16px;display:flex;align-items:center;gap:8px}
.trendIcon{width:20px;text-align:center;font-size:14px;color:var(--muted)}
.dataItem.compact{padding:8px}
.dataItem.compact .val{display:flex;gap:10px;align-items:center;font-weight:700}
.smallTime{font-size:13px;color:var(--muted)}

/* Tides / forecast */
.tideRow{
  display:grid;
  /* Total content: 800 + 12 (gap) + 140 = 952px (Matches topBand) */
  grid-template-columns: minmax(min-content, 800px) 140px;
  gap:12px;
  align-items:stretch;
  justify-content: start;
}
#tideCanvas{width:100%;height:210px;border-radius:8px;background:linear-gradient(180deg,#06282f,#04202a);display:block}
.tideCanvasWrap { min-width: 0; }
.stackBox{padding:2px 10px;border-radius:8px;background:linear-gradient(180deg,rgba(255,255,255,0.01),rgba(0,0,0,0.02));border:1px solid rgba(255,255,255,0.03);box-sizing:border-box}
.oceanStack {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.forecastRow{display:flex;gap:20px;overflow-x:auto;padding:2px 0}
.fcard{display:flex;align-items:center;white-space:nowrap;box-sizing:border-box}

.mutedTiny{color:var(--muted);font-size:11px}
.dashboardHeader{font-size:11px;color:var(--muted);font-weight:500;opacity:0.6;margin-bottom:8px;letter-spacing:0.02em}
.dashboardHeader{font-size:16px;color:var(--muted);font-weight:500;opacity:0.6;margin-bottom:3px;letter-spacing:0.02em}
.nowBadge{background:var(--now-accent);color:#071018;padding:4px 8px;border-radius:12px;font-weight:700;font-size:12px}

/* Responsive tweaks */
@media (max-width:900px) and (min-width:700px){
  .tempValue{font-size:72px;line-height:72px}
  .sparkWrap{height:44px}
  #tempSpark{height:34px}

  /* keep the right column consistent at this breakpoint */
  .topBand{ grid-template-columns: minmax(min-content, 720px) 220px; }
  .tideRow{ grid-template-columns: minmax(min-content, 800px) 140px; }

  .windWrap,.rainWrap{flex:0 0 100px}
  .compassWrap{width:92px;height:92px}
  .miniCard{min-width:92px;padding:8px}
  .conditionWrap{flex:0 0 118px}
  .conditionIcon{width:80px;height:80px} /* Standardized to 80px */
  .conditionIcon svg{width:78px;height:78px}
  .conditionText{font-size:0.94rem;min-height:2.2rem}
  #conditionIconSvg{width:56px;height:56px}
}

@media (max-width:700px){
  .tempValue{font-size:60px;line-height:60px}
  .sparkWrap{height:36px}
  #tempSpark{height:28px}

  /* narrower right column on smaller screens */
  .topBand{ grid-template-columns: minmax(min-content, 720px) 180px; }
  /* Aligning bottom right edge: 760 + 12 + 140 = 912 (matches 720 + 12 + 180) */
  .tideRow{ grid-template-columns: minmax(min-content, 760px) 140px; }

  .windWrap,.rainWrap{flex:0 0 88px}
  .tempWrap{min-width:180px}
  .compassWrap{width:80px;height:80px}
  .miniCard{min-width:84px;padding:8px}
  .conditionWrap{flex:0 0 80px} /* Standardized to 80px */
  .conditionIcon{width:64px;height:64px}
  .conditionIcon svg{width:64px;height:64px}
  .conditionText{font-size:0.88rem;min-height:2rem}
  #conditionIconSvg{width:48px;height:48px}
}

@media (max-width:520px){
  /* stack vertically on very small screens */
  .topBand{ grid-template-columns: 1fr; }
  .topRowItems{flex-wrap:wrap}
  .rightBand{width:100%}
}

@keyframes puddle-pulse {
  0%, 100% { transform: scale(1); opacity: 0.5; }
  50% { transform: scale(1.15); opacity: 0.9; }
}
@keyframes warning-pulse {
  0%, 100% { opacity: 0.3; transform: translateX(-50%) scale(0.9); }
  50% { opacity: 1; transform: translateX(-50%) scale(1.1); }
}
@keyframes storm-pulse {
  0% { transform: translateX(-50%) scale(1); opacity: 1; }
  50% { transform: translateX(-50%) scale(1.2); opacity: 0.7; }
  100% { transform: translateX(-50%) scale(1); opacity: 1; }
}
@keyframes box-storm-pulse {
  0%, 100% { background: rgba(255,255,255,0.08); }
  50% { background: rgba(255, 107, 107, 0.25); }
}
.pressureCard.is-storm-alert {
  animation: box-storm-pulse 2s infinite ease-in-out;
  border: 1px solid var(--danger) !important;
}
.top
</style>

 // -------------------------
  // OWM → ICON MAPPING
  // -------------------------
  function mapOwmToIconId(code, iconStr) {
    const c = Number(code);
    const night = typeof iconStr === 'string' && iconStr.endsWith('n');

    if (c === 800) return night ? 'icon-clear-night' : 'icon-clear-day';
    if (c === 801) return night ? 'icon-few-clouds-night' : 'icon-few-clouds-day';
    if (c === 802) return 'icon-scattered-clouds';
    if (c === 803) return 'icon-broken-clouds';
    if (c === 804) return 'icon-overcast';

    if (c >= 200 && c <= 232) {
      if (c === 210 || c === 211 || c === 212 || c === 221) return 'icon-thunder';
      return 'icon-thunder-rain';
    }

    if (c >= 300 && c <= 321) return 'icon-drizzle';

    if (c === 500) return 'icon-light-rain';
    if (c === 501) return 'icon-rain';
    if (c >= 502 && c <= 504) return 'icon-heavy-rain';
    if (c === 511) return 'icon-sleet';
    if (c >= 520 && c <= 531) return 'icon-shower-rain';

    if (c >= 600 && c <= 602) return 'icon-snow';
    if (c >= 611 && c <= 616) return 'icon-rain-snow';
    if (c >= 620 && c <= 622) return 'icon-snow';

    if (c === 701) return 'icon-mist';
    if (c === 711) return 'icon-smoke';
    if (c === 721) return 'icon-haze';
    if (c === 731 || c === 751 || c === 761) return 'icon-dust';
    if (c === 741) return 'icon-fog';
    if (c === 762) return 'icon-smoke';
    if (c === 771) return 'icon-squall';
    if (c === 781) return 'icon-tornado';

    return 'icon-unknown';
  }

/* Map NWS and OpenWeather icon codes to sprite IDs */
function mapNwsToIconId(code, isNightGuess = false) {
  if (!code) return 'icon-unknown';
  let s = String(code).toLowerCase().trim();
  if (s.includes('?')) s = s.split('?')[0];
  s = s.replace(/_/g,'-').replace(/\s+/g,'-');

  if (s === 'skc') s = 'clear';
  if (s === 'sunny') s = 'clear';

  const owm = s.match(/^0?([0-9]{1,2})([dn])$/);
  if (owm) {
    const num = owm[1].padStart(2,'0');
    const night = owm[2] === 'n';
    switch(num) {
      case '01': return night ? 'icon-clear-night' : 'icon-clear-day';
      case '02': return night ? 'icon-few-clouds-night' : 'icon-few-clouds-day';
      case '03': return 'icon-scattered-clouds';
      case '04': return 'icon-broken-clouds';
      case '09': return 'icon-drizzle';
      case '10': return 'icon-rain';
      case '11': return 'icon-thunder-rain';
      case '13': return 'icon-snow';
      case '50': return 'icon-mist';
      default: return 'icon-unknown';
    }
  }

  if (s === 'clear') return isNightGuess ? 'icon-clear-night' : 'icon-clear-day';
  if (s === 'few' || s === 'sct' || s === 'few-clouds' || s === 'scattered') return isNightGuess ? 'icon-few-clouds-night' : 'icon-few-clouds-day';
  if (s.includes('partly')) return isNightGuess ? 'icon-few-clouds-night' : 'icon-few-clouds-day';
  if (s.includes('scattered-cloud')) return 'icon-scattered-clouds';
  if (s.includes('broken') || s === 'bkn') return 'icon-broken-clouds';
  if (s.includes('overcast') || s === 'ovc') return 'icon-overcast';
  if (s.includes('drizzle')) return 'icon-drizzle';
  if (s.includes('rain-showers') || s.includes('rain_showers') || s.includes('showers')) return 'icon-light-rain';
  if (s.includes('shower') && s.includes('rain')) return 'icon-shower-rain';
  if (s.includes('rain')) return 'icon-rain';
  if (s.includes('heavy')) return 'icon-heavy-rain';
  if (s.includes('sleet') || s.includes('ice')) return 'icon-sleet';
  if (s.includes('mix') || s.includes('rain-snow')) return 'icon-rain-snow';
  if (s.includes('snow')) return 'icon-snow';
  if (s.includes('thunder') || s.includes('tsra') || s.includes('tstorm')) return s.includes('rain') ? 'icon-thunder-rain' : 'icon-thunder';
  if (s.includes('mist')) return 'icon-mist';
  if (s.includes('fog')) return 'icon-fog';
  if (s.includes('haze')) return 'icon-haze';
  if (s.includes('dust')) return 'icon-dust';
  if (s.includes('smoke')) return 'icon-smoke';
  if (s.includes('squall')) return 'icon-squall';
  if (s.includes('tornado')) return 'icon-tornado';

  return 'icon-unknown';
}

/* Backwards compatibility alias */
window.mapOwmToIconId = window.mapOwmToIconId || function(code, iconStr) {
  const isNight = typeof iconStr === 'string' && /n|night/i.test(iconStr);
  return mapNwsToIconId(code, isNight);
};

/* Clone <symbol> contents into an inline SVG string */
function getIconSvg(symbolId, opts = {}) {
  if (!symbolId) return '';
  const sym = document.getElementById(symbolId);
  if (!sym) return '';
  const vb = sym.getAttribute('viewBox') || sym.getAttribute('viewbox') || '0 0 24 24';
  const width = opts.width || '26';
  const height = opts.height || '26';
  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox', vb);
  svg.setAttribute('width', width);
  svg.setAttribute('height', height);
  svg.setAttribute('aria-hidden', 'true');
  svg.innerHTML = sym.innerHTML;
  const fillColor = opts.fill || svg.getAttribute('data-fill') || '#cfd8dc';
  Array.from(svg.querySelectorAll('path,rect,circle,polygon,ellipse,line')).forEach(n=>{
    if (!n.getAttribute('fill') && !n.getAttribute('stroke')) n.setAttribute('fill', fillColor);
  });
  return svg.outerHTML;
}

/* Find the best container to render forecast into:
   1) #forecastBar if present
   2) common ancestor of existing .forecastIcon nodes (keeps layout)
   3) fallback to <main> or document.body */
function findForecastContainer() {
  const byId = document.getElementById('forecastBar');
  if (byId) return byId;

  const icons = Array.from(document.querySelectorAll('.forecastIcon, svg.forecastIcon'));
  if (icons.length) {
    // find common ancestor of the first and last icon
    const first = icons[0].parentElement;
    const last = icons[icons.length - 1].parentElement;
    if (first && last) {
      // if they share the same parent, use that parent
      if (first === last) return first;
      // otherwise use their nearest common ancestor
      function ancestors(el) {
        const a = [];
        while (el) { a.push(el); el = el.parentElement; }
        return a;
      }
      const a1 = ancestors(first);
      const a2 = ancestors(last);
      for (const node of a1) {
        if (a2.includes(node)) return node;
      }
    }
    // fallback to parent of first icon
    if (first) return first;
  }

  return document.querySelector('main') || document.body;
}

/* Ensure forecast renders after DOM ready and when kiosk data arrives */
(function initForecastRender() {
  function tryRender() {
    if (window.__lastKioskData && window.__lastKioskData.forecast) {
      // If sprite symbols are not present, attempt a best-effort clone of any sprite into head
      if (!document.getElementById('icon-clear-day')) {
        const anySym = document.querySelector('svg symbol, symbol');
        if (anySym) {
          let top = anySym;
          while (top && top.tagName && top.tagName.toLowerCase() !== 'svg') top = top.parentElement;
          if (top) {
            const clone = top.cloneNode(true);
            clone.setAttribute('data-sprite-copied','true');
            clone.style.display = 'none';
            document.head.appendChild(clone);
          }
        }
      }
      try { renderForecast7(window.__lastKioskData.forecast); } catch(e){ console.warn('renderForecast7 error', e); }
      return true;
    }
    return false;
  }

  if (document.readyState === 'complete' || document.readyState === 'interactive') {
    if (!tryRender()) window.addEventListener('kioskDataReady', tryRender, { once: true });
  } else {
    document.addEventListener('DOMContentLoaded', () => {
      if (!tryRender()) window.addEventListener('kioskDataReady', tryRender, { once: true });
    }, { once: true });
  }
})();





function updateWindHistoryArc() {
  const arcGroup = document.getElementById("windHistoryArc");
  if (!arcGroup) return;

  arcGroup.innerHTML = "";
  if (!windDirHistory.length) return;

  const bucketSize = 10; // Granularity of the heatmap segments (10 degree buckets) - kept
  const bucketCount = 360 / bucketSize;
  const buckets = new Array(bucketCount).fill(0);

  windDirHistory.forEach(dir => {
    const idx = Math.floor((dir % 360) / bucketSize);
    buckets[idx]++;
  });

  const threshold = 3; // Only render wedges if there are repeated readings (>= 2)
  const maxCount = Math.max(...buckets, threshold);
  const cx = 50, cy = 50, r = 44;

  buckets.forEach((count, i) => {
    if (count < threshold) return;

    const startAngle = i * bucketSize;
    const endAngle = startAngle + bucketSize;
    // Normalize density relative to the threshold for a better heatmap gradient
    const density = (count - threshold) / (maxCount - threshold || 1);

    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
    path.setAttribute("d", describeWedge(cx, cy, r, startAngle, endAngle)); // Use new describeWedge function
    // Shading based on frequency (density) to create heatmap effect using fill
    path.setAttribute("fill", `rgba(255, 255, 255, ${0.02 + density * 0.13})`); // Range from 2% to 15% opacity
    path.setAttribute("stroke", "none"); // No stroke for filled wedges

    arcGroup.appendChild(path);
  });
}

function polarToCartesian(cx, cy, r, angleDeg) {
  const rad = (angleDeg - 90) * Math.PI / 180;
  return {
    x: cx + r * Math.cos(rad),
    y: cy + r * Math.sin(rad)
  };
}

/**
 * Generates an SVG path string for a circular wedge (sector).
 * @param {number} cx Center X coordinate.
 * @param {number} cy Center Y coordinate.
 * @param {number} r Radius of the arc.
 * @param {number} startAngle Start angle in degrees (0 is North, increases clockwise).
 * @param {number} endAngle End angle in degrees.
 * @returns {string} SVG path data.
 */
function describeWedge(cx, cy, r, startAngle, endAngle) {
  const start = polarToCartesian(cx, cy, r, startAngle);
  const end = polarToCartesian(cx, cy, r, endAngle);
  const largeArcFlag = (endAngle - startAngle) <= 180 ? "0" : "1";
  const sweepFlag = "1"; // Always clockwise for a wedge
  return [
    "M", cx, cy, // Move to center
    "L", start.x, start.y, // Line to the start of the arc
    "A", r, r, 0, largeArcFlag, sweepFlag, end.x, end.y, // Arc segment
    "Z" // Close path (draws line back to center)
  ].join(" ");
}

function setConditionIcon(code, iconStr) {
  const svg = document.getElementById('conditionIconSvg');
  if (!svg) return;

  // compute icon id from mapper
  const iconId = (typeof mapOwmToIconId === 'function') ? mapOwmToIconId(code, iconStr) : null;

  // ensure visible defaults
  svg.style.display = svg.style.display || 'block';
  svg.style.width = svg.style.width || '48px';
  svg.style.height = svg.style.height || '48px';
  svg.style.opacity = svg.style.opacity || '1';
  if (!svg.getAttribute('role')) svg.setAttribute('role', 'img');

  // find the symbol
  const sym = iconId ? document.getElementById(iconId) : null;

  if (sym && sym.ownerDocument === document) {
    // copy viewBox (handle both viewBox and viewbox)
    const vb = sym.getAttribute('viewBox') || sym.getAttribute('viewbox') || '0 0 24 24';
    svg.setAttribute('viewBox', vb);

    // copy symbol children into the target svg (avoid <use> quirks)
    svg.innerHTML = sym.innerHTML;

    // ensure a visible fill color for all shapes
    const fillColor = svg.getAttribute('data-fill') || 'var(--text)';
    svg.style.fill = fillColor;
    Array.from(svg.querySelectorAll('path,rect,circle,polygon,ellipse,line')).forEach(n => {
      if (!n.getAttribute('fill')) n.setAttribute('fill', fillColor);
      n.removeAttribute('mask');
      n.removeAttribute('clip-path');
    });

    svg.setAttribute('aria-label', iconId);
    return;
  }

  // fallback: if symbol exists but not in same document, or missing, try <use> then final badge
  svg.innerHTML = '';
  if (iconId) {
    // try <use> as a fallback
    const use = document.createElementNS('http://www.w3.org/2000/svg','use');
    use.setAttribute('href', `#${iconId}`);
    use.setAttributeNS('http://www.w3.org/1999/xlink','href', `#${iconId}`);
    use.setAttribute('fill', svg.getAttribute('data-fill') || '#cfd8dc');
    svg.appendChild(use);

    // if nothing renders, clone after next frame
    requestAnimationFrame(() => {
      try {
        const bbox = svg.getBBox();
        if (!bbox || (bbox.width === 0 && bbox.height === 0)) {
          const sym2 = document.getElementById(iconId);
          if (sym2) {
            svg.innerHTML = sym2.innerHTML;
            svg.setAttribute('viewBox', sym2.getAttribute('viewBox') || sym2.getAttribute('viewbox') || '0 0 24 24');
          }
        }
      } catch (e) {
        // fallback to badge below
      }
    });

    svg.setAttribute('aria-label', iconId);
    return;
  }

  // final fallback badge
  const ns = 'http://www.w3.org/2000/svg';
  svg.innerHTML = '';
  svg.setAttribute('viewBox', '0 0 24 24');
  const circle = document.createElementNS(ns,'circle');
  circle.setAttribute('cx','12'); circle.setAttribute('cy','12'); circle.setAttribute('r','10'); circle.setAttribute('fill','#9fb6c2');
  svg.appendChild(circle);
  const text = document.createElementNS(ns,'text');
  text.setAttribute('x','12'); text.setAttribute('y','16'); text.setAttribute('font-size','10'); text.setAttribute('text-anchor','middle'); text.setAttribute('fill','#071018');
  text.textContent = (iconStr || '').toString().slice(0,3).toUpperCase();
  svg.appendChild(text);
  svg.setAttribute('aria-label', 'icon-unknown');
}


  // -------------------------

  function setPressureTrendIcon(elId, deltaInHg){
    const arrow = document.getElementById(elId);
    const card = arrow ? arrow.closest('.pressureCard') : null;
    const steadyText = document.getElementById('pressureSteadyText');
    if (!arrow) return;
    arrow.style.display = 'none';
    arrow.style.borderTop = '';
    arrow.style.borderBottom = ''; // Reset border-bottom
    arrow.style.top = '';
    arrow.style.bottom = '';
    arrow.title = '';
    arrow.classList.remove('is-storm-warning'); // Always remove first
    if (card) card.classList.remove('is-storm-alert');
    arrow.setAttribute('aria-hidden', 'true');
    if (steadyText) steadyText.style.display = 'none';

    if (deltaInHg === null || deltaInHg === undefined) {
      arrow.setAttribute('aria-label', 'Trend unknown');
      if (steadyText) steadyText.style.display = 'block'; // Show stdy as the default/waiting state
      return;
    }

    if (Math.abs(deltaInHg) <= 0.03) {
      arrow.setAttribute('aria-label', 'Pressure steady');
      if (steadyText) steadyText.style.display = 'block';
      return;
    }

    if (deltaInHg > 0) {
      arrow.style.display = 'block';
      arrow.style.borderLeft = '6px solid transparent'; // Smaller arrow for smaller gauge
      arrow.style.borderRight = '6px solid transparent'; // Smaller arrow for smaller gauge
      arrow.style.borderBottom = '10px solid #2aa876'; // Smaller arrow for smaller gauge
      arrow.style.top = '26px'; // Adjusted for 94px gauge
      arrow.style.bottom = '';
      arrow.setAttribute('aria-label', 'Pressure rising');
      arrow.setAttribute('aria-hidden', 'false');
      arrow.title = 'Rising';
    } else {
      arrow.style.display = 'block';
      arrow.style.borderLeft = '6px solid transparent'; // Smaller arrow for smaller gauge
      arrow.style.borderRight = '6px solid transparent'; // Smaller arrow for smaller gauge
      arrow.style.borderTop = '10px solid var(--danger)'; // Smaller arrow for smaller gauge
      arrow.style.top = '68px'; // Adjusted for 94px gauge
      arrow.style.bottom = '';
      arrow.setAttribute('aria-label', 'Pressure falling');
      arrow.setAttribute('aria-hidden', 'false');
      arrow.title = 'Falling';
      // Check for storm warning condition
      if (deltaInHg < -0.03) { // Pressure dropped more than 0.03 inHg
        arrow.classList.add('is-storm-warning');
        arrow.title = 'Falling rapidly (Storm Warning)'; // Update title for more info
      }
      // Severe drop: pulse the entire box
      if (deltaInHg < -0.12 && card) {
        card.classList.add('is-storm-alert');
      }
    }
  }

  // -------------------------
  // Sunrise / Moon / Tide helpers (complete)
  // -------------------------
  async function fetchSunTimes(lat, lon){
    try {
      const iso = new Date().toISOString().slice(0,10);
      const url = `https://api.sunrise-sunset.org/json?lat=${encodeURIComponent(lat)}&lng=${encodeURIComponent(lon)}&date=${iso}&formatted=0`;
      const r = await fetch(url);
      if (!r.ok) return null;
      const j = await r.json();
      if (j.status !== 'OK') return null;
      return { sunrise: new Date(j.results.sunrise), sunset: new Date(j.results.sunset) };
    } catch (e) { console.warn('fetchSunTimes failed', e); return null; }
  }

function getMoonPhase(date = new Date()) {
  const lp = 2551443; // synodic month in seconds
  const now = Math.floor(date.getTime() / 1000);
  const new_moon = Math.floor(new Date("2000-01-06T18:14:00Z").getTime() / 1000);
  let fraction = ((now - new_moon) % lp) / lp;
  if (fraction < 0) fraction += 1;

  let name, index;
  // Refined ranges to catch specific moments like "Quarter" vs the longer "Crescent" phases
  if (fraction < 0.03 || fraction > 0.97) { name = "New Moon"; index = 0; }
  else if (fraction < 0.22) { name = "Waxing Crescent"; index = 1; }
  else if (fraction < 0.28) { name = "First Quarter"; index = 2; }
  else if (fraction < 0.47) { name = "Waxing Gibbous"; index = 3; }
  else if (fraction < 0.53) { name = "Full Moon"; index = 4; }
  else if (fraction < 0.72) { name = "Waning Gibbous"; index = 5; }
  else if (fraction < 0.78) { name = "Last Quarter"; index = 6; }
  else { name = "Waning Crescent"; index = 7; }

  return { name, index, fraction };
}

function getMoonKeyword(phaseText) {
  const p = phaseText.toLowerCase();
  if (p.includes("new")) return "New";
  if (p.includes("full")) return "Full";
  if (p.includes("quarter")) return "Quarter";
  if (p.includes("waxing")) return "Waxing";
  if (p.includes("waning")) return "Waning";
  return phaseText;
}






  // -------------------------
  // Sparkline (DPR-aware)
  // -------------------------
  function drawTempSparkline(points, sunriseTs, sunsetTs){
    const canvas = document.getElementById('tempSpark');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const rect = canvas.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = Math.round(rect.width * dpr);
    canvas.height = Math.round(rect.height * dpr);
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.clearRect(0,0,rect.width,rect.height);

    if (!Array.isArray(points) || points.length === 0){
      ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--muted') || '#9fb6c2';
      ctx.font = '12px system-ui';
      ctx.fillText('No recent temps', 8, rect.height/2 + 4);
      setText('sparkRange','— / —');
      return;
    }

    const scale = uiScale();
    const vals = points.map(p => p.f);
    const minF = Math.min(...vals);
    const maxF = Math.max(...vals);
    
    // Apply minimum temperature range for better scaling
    // This prevents small 1-2 degree changes from looking dramatic
    const actualRange = maxF - minF;
    const minRange = 12; // degrees F - minimum range to show on chart
    const scaledRange = Math.max(actualRange, minRange);
    const midpoint = (minF + maxF) / 2;
    const scaledMin = midpoint - scaledRange / 2;
    const scaledMax = midpoint + scaledRange / 2;
    
    const padX = 6, padY = 6;
    const w = rect.width - padX*2;
    const h = rect.height - padY*2;
    const t0 = points[0].ts, t1 = points[points.length-1].ts;
    const denom = (t1 - t0) || 1;
    const mapX = ts => padX + ((ts - t0) / denom) * w;
    const mapY = f => padY + (1 - (f - scaledMin) / (scaledMax - scaledMin)) * h;

    // Night Shading Overlay
    if (sunriseTs && sunsetTs) {
      const sMs = toMs(sunriseTs), setMs = toMs(sunsetTs);
      if (sMs && setMs) {
        ctx.save();
        ctx.fillStyle = 'rgba(0, 0, 0, 0.25)';
        const day = 24 * 3600 * 1000;
        for (let k = -2; k <= 2; k++) {
          const ns = setMs + k * day, ne = sMs + (k + 1) * day;
          const sN = Math.max(ns, t0), eN = Math.min(ne, t1);
          if (eN > sN) {
            const x1 = mapX(sN), x2 = mapX(eN);
            ctx.fillRect(x1, 0, x2 - x1, rect.height);
          }
        }
        ctx.restore();
      }
    }

    ctx.beginPath();
    points.forEach((p,i) => {
      const x = mapX(p.ts), y = mapY(p.f);
      if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    });
    ctx.lineTo(padX + w, padY + h);
    ctx.lineTo(padX, padY + h);
    ctx.closePath();
    const grad = ctx.createLinearGradient(0,padY,0,padY+h);
    grad.addColorStop(0,'rgba(255, 209, 102, 0.16)');
    grad.addColorStop(1,'rgba(255, 209, 102, 0.02)');
    ctx.fillStyle = grad;
    ctx.fill();

    ctx.beginPath();
    points.forEach((p,i) => {
      const x = mapX(p.ts), y = mapY(p.f);
      if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    });
    ctx.strokeStyle = '#ffd166';
    ctx.lineWidth = Math.max(1, 2 * scale);
    ctx.stroke();

    // x-axis time markings (exact hour values in 3-hour increments)
    const hourMs = 60 * 60 * 1000;
    const stepMs = 3 * hourMs;
    const firstHour = Math.ceil(t0 / hourMs) * hourMs;
    const firstTick = Math.ceil(firstHour / stepMs) * stepMs;
    const ticks = [];
    for (let ts = firstTick; ts <= t1; ts += stepMs) {
      ticks.push(ts);
      if (ticks.length >= 5) break;
    }
    ctx.fillStyle = 'rgba(255,255,255,0.82)';
    ctx.font = `${10 * Math.max(1, scale)}px system-ui`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ticks.forEach(ts => {
      const x = mapX(ts);
      const label = new Date(ts).toLocaleTimeString([], { hour: 'numeric', hour12: true }).toLowerCase().replace(' ', '');
      ctx.fillText(label, x, padY + h - 2);
    });

    const last = points[points.length-1];
    const nowX = mapX(last.ts);

    ctx.beginPath(); ctx.fillStyle = '#071018'; ctx.strokeStyle = '#ffd166'; ctx.lineWidth = Math.max(1, 1.2 * scale);
    ctx.arc(nowX, mapY(last.f), Math.max(2, 4 * scale), 0, Math.PI*2); ctx.fill(); ctx.stroke();

    setText('sparkRange', minF.toFixed(1) + '°F / ' + maxF.toFixed(1) + '°F');
  }

  // -------------------------
  // Tide chart (DPR-aware)
  // -------------------------
  function drawTideChart(samples, highs, lows, sunriseTs, sunsetTs){
    const toMsLocal = v => { if (v === null || v === undefined) return null; if (typeof v !== 'number') v = Number(v); if (isNaN(v)) return null; return v < 1e12 ? v * 1000 : v; };
    const c = document.getElementById('tideCanvas');
    if (!c) return;
    const ctx = c.getContext('2d');
    requestAnimationFrame(() => {
      const rect = c.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      c.width = Math.round(rect.width * dpr);
      c.height = Math.round(rect.height * dpr);
      ctx.setTransform(dpr,0,0,dpr,0,0);
      ctx.clearRect(0,0,rect.width,rect.height);

      const raw = Array.isArray(samples) ? samples.map(p => ({ ts: toMsLocal(p.ts), height: Number(p.height) })) : [];
      const H = Array.isArray(highs) ? highs.map(p => ({ ts: toMsLocal(p.ts), height: Number(p.height) })) : [];
      const L = Array.isArray(lows) ? lows.map(p => ({ ts: toMsLocal(p.ts), height: Number(p.height) })) : [];

      const now = Date.now();
      const windowStart = now - (8 * 3600 * 1000); // 8 hours past (1/3 of 24h)
      const windowEnd = now + (16 * 3600 * 1000); // 16 hours future (2/3 of 24h)

      let pts = raw.filter(p => p.ts >= windowStart && p.ts <= windowEnd).sort((a,b)=>a.ts-b.ts);

      if (!pts || pts.length < 2){
        const combined = [...H.map(h=>({...h,type:'H'})), ...L.map(l=>({...l,type:'L'}))].filter(p=>p.ts && !isNaN(p.height)).sort((a,b)=>a.ts-b.ts);
        if (combined.length){
          const out = [];
          for (let i=0;i<combined.length-1;i++){
            const a = combined[i], b = combined[i+1];
            const steps = Math.max(1, Math.floor((b.ts - a.ts) / (60*1000)));
            for (let s=0;s<=steps;s++){
              const t = a.ts + (s/steps)*(b.ts - a.ts);
              const y = 0.5*(a.height + b.height) + 0.5*(a.height - b.height)*Math.cos(Math.PI*(s/steps));
              out.push({ ts: Math.round(t), height: y });
            }
          }
          pts = out.filter(p => p.ts >= windowStart && p.ts <= windowEnd);
        }
      }

      if (!pts || pts.length < 2){
        ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--muted') || '#9fb6c2';
        ctx.font = '14px system-ui';
        ctx.fillText('Tide data unavailable', 12, 40);
        return;
      }

      const smooth = [];
      for (let i=0;i<pts.length;i++){
        const prev = pts[i-1] ? pts[i-1].height : pts[i].height;
        const cur = pts[i].height;
        const next = pts[i+1] ? pts[i+1].height : pts[i].height;
        smooth.push({ ts: pts[i].ts, height: (prev + cur + next) / 3 });
      }
      pts = smooth;

      const heights = pts.map(p => p.height);
      const minH = Math.min(...heights);
      const maxH = Math.max(...heights);
      const range = (maxH - minH) || 1;

      const padLeft = 56, pad = 12, topOffset = 0;
      const w = rect.width - padLeft - pad;
      const h = rect.height - pad*2 - topOffset;
      const originX = padLeft, originY = pad + topOffset;

      const vPadFrac = 0.26;
      const paddedMinH = minH - range * vPadFrac;
      const paddedMaxH = maxH + range * vPadFrac;
      const paddedRange = (paddedMaxH - paddedMinH) || 1;

      const mapX = ts => originX + ((ts - windowStart) / (windowEnd - windowStart)) * w;
      const mapY = height => originY + h - ((height - paddedMinH) / paddedRange) * h;

      // Night shading and Watermarks
      (function(){
        const sMs = toMsLocal(sunriseTs), setMs = toMsLocal(sunsetTs);
        if (sMs && setMs){
          ctx.save();
          const day = 24*3600*1000;
          for (let k=-2;k<=2;k++){
            // --- Night Blocks ---
            const ns = setMs + k*day, ne = sMs + (k+1)*day;
            const sN = Math.max(ns, windowStart), eN = Math.min(ne, windowEnd);
            if (eN > sN){
              const x1 = mapX(sN), x2 = mapX(eN);
              ctx.fillStyle = 'rgba(6,18,30,0.70)';
              ctx.fillRect(Math.max(originX,x1), originY, Math.max(0, Math.min(originX+w,x2) - Math.max(originX,x1)), h);
              
              // Moon watermark
              const cx = mapX((sN + eN) / 2);
              const cy = originY + h / 2;
              const r = 35 * uiScale();
              ctx.save();
              ctx.translate(cx, cy);
              ctx.fillStyle = 'rgba(255,255,255,0.05)';
              ctx.beginPath();
              ctx.arc(0, 0, r, 0.5 * Math.PI, 1.5 * Math.PI);
              ctx.arc(r * 0.6, 0, r, 1.5 * Math.PI, 0.5 * Math.PI, true);
              ctx.fill();
              ctx.restore();
            }

            // --- Day Blocks ---
            const ds = sMs + k*day, de = setMs + k*day;
            const sD = Math.max(ds, windowStart), eD = Math.min(de, windowEnd);
            if (eD > sD) {
              // Sun watermark
              const cx = mapX((sD + eD) / 2);
              const cy = originY + h / 2;
              const r = 30 * uiScale();
              ctx.save();
              ctx.translate(cx, cy);
              ctx.strokeStyle = 'rgba(255,255,255,0.05)';
              ctx.lineWidth = 2 * uiScale();
              ctx.beginPath(); ctx.arc(0, 0, r * 0.4, 0, Math.PI * 2); ctx.stroke();
              for (let i = 0; i < 8; i++) {
                ctx.rotate(Math.PI / 4);
                ctx.beginPath();
                ctx.moveTo(r * 0.55, 0); ctx.lineTo(r * 0.85, 0);
                ctx.stroke();
              }
              ctx.restore();
            }
          }
          ctx.restore();
        }
      })();

      ctx.strokeStyle = 'rgba(255,255,255,0.06)';
      ctx.lineWidth = 1;
      ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--muted') || '#9fb6c2';
      ctx.font = '12px system-ui';
      ctx.textAlign = 'right';
      const M_TO_FT = 3.28084;
      const yTicks = 4;
      for (let i=0;i<=yTicks;i++){
        const frac = i / yTicks;
        const y = originY + (h * frac);
        const val = paddedMaxH - paddedRange * frac;
        ctx.beginPath(); ctx.moveTo(originX, y); ctx.lineTo(originX + w, y); ctx.stroke();
        ctx.fillText((val * M_TO_FT).toFixed(1) + ' ft', originX - 8, y + 4);
      }

      ctx.beginPath();
      pts.forEach((p, idx) => {
        const x = mapX(Math.max(windowStart, Math.min(windowEnd, p.ts)));
        const y = mapY(p.height);
        if (idx===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
      });
      ctx.strokeStyle = 'rgba(120,210,200,0.98)';
      ctx.lineWidth = 5 * uiScale();
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';
      ctx.stroke();

      ctx.lineTo(originX + w, originY + h);
      ctx.lineTo(originX, originY + h);
      ctx.closePath();
      ctx.fillStyle = 'rgba(120,210,200,0.08)';
      ctx.fill();

      (H||[]).forEach(hp => {
        if (!hp.ts || hp.ts < windowStart || hp.ts > windowEnd) return;
        const x = mapX(hp.ts), y = mapY(hp.height);
        ctx.fillStyle = '#ffd166';
        ctx.beginPath(); ctx.arc(x,y,5 * uiScale(),0,Math.PI*2); ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.9)'; /* Increased visibility */
        ctx.font = `${16 * uiScale()}px system-ui`; /* Increased font size */
        ctx.textAlign = 'left';
        ctx.fillText(new Date(hp.ts).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) + ' H ' + (hp.height/0.3048).toFixed(2) + ' ft', x + 6, y - 6);
      });
      (L||[]).forEach(lp => {
        if (!lp.ts || lp.ts < windowStart || lp.ts > windowEnd) return;
        const x = mapX(lp.ts), y = mapY(lp.height);
        ctx.fillStyle = '#9be7d9';
        ctx.beginPath(); ctx.arc(x,y,5 * uiScale(),0,Math.PI*2); ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.9)'; /* Increased visibility */
        ctx.font = `${16 * uiScale()}px system-ui`; /* Increased font size */
        ctx.textAlign = 'left';
        ctx.fillText(new Date(lp.ts).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) + ' L ' + (lp.height/0.3048).toFixed(2) + ' ft', x + 6, y + 14);
      });

      // --- Time Grid Lines (12am, 6am, 12pm, 6pm) ---
      const tickHrs = [0, 6, 12, 18];
      ctx.save();
      ctx.fillStyle = 'rgba(255,255,255,0.45)';
      ctx.font = `${10 * uiScale()}px system-ui`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      
      let tIter = new Date(windowStart);
      tIter.setMinutes(0, 0, 0); // Start at the beginning of the current hour
      
      for (let i = 0; i <= 26; i++) {
        const ts = tIter.getTime();
        if (ts >= windowStart && ts <= windowEnd && tickHrs.includes(tIter.getHours())) {
          const x = mapX(ts);
          const hrs = tIter.getHours();
          const label = hrs === 0 ? '12am' : hrs === 12 ? '12pm' : (hrs < 12 ? hrs + 'am' : (hrs - 12) + 'pm');
          ctx.beginPath();
          ctx.moveTo(x, originY);
          ctx.lineTo(x, originY + h);
          ctx.strokeStyle = 'rgba(255,255,255,0.06)';
          ctx.lineWidth = 1;
          ctx.stroke();
          ctx.fillText(label, x, rect.height - 2);
        }
        tIter.setHours(tIter.getHours() + 1);
      }
      ctx.restore();

      const nowX = mapX(now);
      const clampedNowX = Math.max(originX, Math.min(originX + w, nowX));
      ctx.strokeStyle = 'rgba(255,120,60,0.95)';
      ctx.lineWidth = 1.6 * uiScale();
      ctx.beginPath(); ctx.moveTo(clampedNowX, originY); ctx.lineTo(clampedNowX, originY + h); ctx.stroke();
    });
  }

  function renderCompassTicks(){
    const g = document.getElementById('compassTicks');
    if (!g) return;
    g.innerHTML = '';
    for (let i=0;i<16;i++){
      const angle = (i * 22.5) * Math.PI / 180;
      const outerR = 44, innerR = (i % 4 === 0) ? 34 : 38;
      const cx = 50, cy = 50;
      const x1 = cx + Math.sin(angle) * innerR;
      const y1 = cy - Math.cos(angle) * innerR;
      const x2 = cx + Math.sin(angle) * outerR;
      const y2 = cy - Math.cos(angle) * outerR;
      const line = document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1', x1.toFixed(2));
      line.setAttribute('y1', y1.toFixed(2));
      line.setAttribute('x2', x2.toFixed(2));
      line.setAttribute('y2', y2.toFixed(2));
      line.setAttribute('stroke', 'rgba(255,255,255,0.06)');
      line.setAttribute('stroke-width', (i % 4 === 0) ? '1.6' : '1.0');
      line.setAttribute('stroke-linecap', 'round');
      g.appendChild(line);
    }
  }

  /**
   * Dynamically renders pressure gauge ticks from 28.0 to 31.0.
   * Ticks span from 8 PM (240deg) to 4 PM (120deg) clockwise.
   */
  function renderPressureTicks(){
    const g = document.getElementById('pressureTicks');
    if (!g) return;
    g.innerHTML = '';

    const majorValues = [28, 28.5, 29, 29.5, 30, 30.5, 31];
    
    // Iterate from 28.0 to 31.0 in 0.1 increments
    for (let p = 28.0; p <= 31.05; p += 0.1) {
      const isMajor = majorValues.some(mv => Math.abs(mv - p) < 0.05);
      
      // Map 28-31 to 240deg through 360/0deg to 120deg (240 degree total span)
      const angle = 240 + (p - 28) * 80;
      const rad = (angle - 90) * Math.PI / 180;
      
      const cx = 50, cy = 50;
      const outerR = 48;
      const innerR = isMajor ? 36 : 41;

      const x1 = cx + Math.cos(rad) * outerR;
      const y1 = cy + Math.sin(rad) * outerR;
      const x2 = cx + Math.cos(rad) * innerR;
      const y2 = cy + Math.sin(rad) * innerR;

      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', x1.toFixed(2));
      line.setAttribute('y1', y1.toFixed(2));
      line.setAttribute('x2', x2.toFixed(2));
      line.setAttribute('y2', y2.toFixed(2));
      line.setAttribute('stroke', isMajor ? 'rgba(255,255,255,0.7)' : 'rgba(255,255,255,0.25)');
      line.setAttribute('stroke-width', isMajor ? '1.8' : '0.8');
      line.setAttribute('stroke-linecap', 'round');
      g.appendChild(line);
    }
  }

  function degToCardinal8(deg){
    if (deg === null || deg === undefined || isNaN(deg)) return '—';
    const d = (deg + 360) % 360;
    const idx = Math.round(d / 45) % 8;
    return ['N','NE','E','SE','S','SW','W','NW'][idx];
  }

  // -------------------------
  // Resample helper
  // -------------------------
  function resampleToWindow(samples, windowStart, windowEnd, pointsCount = 13){
    if (!Array.isArray(samples) || !samples.length){
      const now = Date.now();
      const base = 50;
      const out = [];
      for (let i = pointsCount - 1; i >= 0; i--) out.push({ ts: now - i * ((windowEnd - windowStart) / (pointsCount - 1)), f: base });
      return out;
    }
    const s = samples.slice().sort((a,b)=>a.ts-b.ts).map((p,i,arr)=>({ ts: i>0 && p.ts<=arr[i-1].ts ? arr[i-1].ts+1000 : p.ts, f: p.f }));
    function interp(t){
      if (t <= s[0].ts) return s[0].f;
      if (t >= s[s.length-1].ts) return s[s.length-1].f;
      let lo = 0, hi = s.length - 1;
      while (hi - lo > 1){
        const mid = Math.floor((lo + hi) / 2);
        if (s[mid].ts <= t) lo = mid; else hi = mid;
      }
      const a = s[lo], b = s[hi];
      const u = (t - a.ts) / (b.ts - a.ts);
      return a.f + u * (b.f - a.f);
    }
    const out = [];
    for (let i=0;i<pointsCount;i++){
      const t = windowStart + (i / (pointsCount - 1)) * (windowEnd - windowStart);
      out.push({ ts: Math.round(t), f: interp(t) });
    }
    return out;
  }

    const unitRect = unit.getBoundingClientRect();
    const dy = numRect.top - unitRect.top;
    const clamp = Math.max(-40, Math.min(40, Math.round(dy)));
    unit.style.transform = `translateY(${clamp}px)`;
    unit.style.lineHeight = '1';
  }

async function updateRightSide(data, historyData = null){
  const pressureHpa = data.weather?.pressure_hpa ?? data.weather?.pressure_mb ?? null;
  const pressureIn = (pressureHpa !== null && pressureHpa !== undefined)
    ? (Number(pressureHpa) / 33.8638866667)
    : null;

  // Update pressure number immediately
  const pressureValueEl = document.getElementById('pressureValue');
  pressureValueEl.textContent = pressureIn !== null ? pressureIn.toFixed(2) : '—';

  // Update pressure needle rotation
  const needle = document.getElementById('pressureNeedle');
  if (needle && pressureIn !== null) {
    const clampedP = Math.max(28, Math.min(31, pressureIn));
    const needleAngle = 240 + (clampedP - 28) * 80;
    needle.setAttribute('transform', `rotate(${needleAngle} 50 50)`);
  }

  let deltaIn = null;

  // Compute trend using history API if available, fallback to station history
  let trendPoints = [];
  if (historyData && Array.isArray(historyData.pressure_last)) {
    trendPoints = historyData.pressure_last.map(i => ({ ts: toMs(i.t), p: safeNum(i.hpa) }));
  } else if (data.station && Array.isArray(data.station.history)) {
    trendPoints = data.station.history.map(h => ({
      ts: toMs(h.ts ?? h.time ?? h.timestamp),
      p: safeNum(h.pressure_hpa ?? h.pressure_mb)
    }));
  }

  const hist = trendPoints.filter(x => x.ts && x.p !== null).sort((a,b) => a.ts - b.ts);

  if (hist.length >= 2) {
    const last = hist[hist.length - 1];
    const threeHoursAgo = last.ts - 3 * 3600 * 1000;
    let prev = hist[0];
    for (let i = hist.length - 1; i >= 0; i--) {
      if (hist[i].ts <= threeHoursAgo) {
        prev = hist[i];
        break;
      }
    }
    deltaIn = (last.p - prev.p) / 33.8638866667;
  }

  // --- Update trend arrow UI ---
  setPressureTrendIcon('pressureTrendArrow', deltaIn);

  // --- Sunrise / Sunset (next event only) ---
  const lat = data.station?.lat ?? data.location?.lat ?? FALLBACK_COORDS.lat;
  const lon = data.station?.lon ?? data.location?.lon ?? FALLBACK_COORDS.lon;
  const sun = await fetchSunTimes(lat, lon);

  if (sun){
    const now = new Date();
    const sunrise = sun.sunrise;
    const sunset = sun.sunset;

    let nextEvent = null;
    let nextLabel = '';
    let nextIcon = '';

    if (sunrise > now && sunset > now) {
      nextEvent = sunrise < sunset ? sunrise : sunset;
      nextLabel = sunrise < sunset ? 'Sunrise' : 'Sunset';
      nextIcon = sunrise < sunset ? '🌅' : '🌇';
    } else if (sunrise > now) {
      nextEvent = sunrise;
      nextLabel = 'Sunrise';
      nextIcon = '🌅';
    } else if (sunset > now) {
      nextEvent = sunset;
      nextLabel = 'Sunset';
      nextIcon = '🌇';
    } else {
      nextEvent = sunrise;
      nextLabel = 'Sunrise';
      nextIcon = '🌅';
    }

document.getElementById('sunNextIcon').innerHTML =
  nextLabel === 'Sunrise' ? sunriseSvg : sunsetSvg;



    document.getElementById('sunNextTime').textContent =
      nextEvent.toLocaleTimeString([], {hour:'numeric', minute:'2-digit'});
  }

  // --- Moon Phase ---
  // --- Moon Phase ---
  const mp = getMoonPhase(new Date());
  document.getElementById('moonIcon').innerHTML = moonSvgBase;

  const p = mp.fraction;
  const R = 28;
  // Calculate the horizontal radius of the elliptical terminator
  const rx = R * Math.abs(1 - 4 * (p % 0.5));
  // Determine sweep flags for a realistic spherical projection
  const sweep = (p % 0.5) < 0.25 ? 0 : 1;
  const outerSweep = p < 0.5 ? 1 : 0;
  
  const d = `M 50 22 A 28 28 0 0 ${outerSweep} 50 78 A ${rx} 28 0 0 ${sweep} 50 22`;
  const moonLitPath = document.getElementById('moonLitPath');
  if (moonLitPath) moonLitPath.setAttribute('d', d);

  document.getElementById('moonLabel').textContent = getMoonKeyword(mp.name);




  // --- Humidity ---
  if (data.weather && data.weather.humidity !== undefined && data.weather.humidity !== null) {

    // Insert the SVG into the tile
    document.getElementById('humidityIcon').innerHTML = humiditySvgBase;

    const h = data.weather.humidity;  // 0–100

    // Map humidity to a blue color
    // 0% → transparent
    // 100% → #4da6ff
    const blue = `rgba(77, 166, 255, ${h/100})`;

    // Color the droplet
    document.getElementById('humidityDroplet').setAttribute('fill', blue);

    // Update the percentage text
    document.getElementById('humidityText').textContent = Math.round(h) + '%';
  }



}

function mapForecastIconId(rawIcon, isNightGuess = false) {
  if (!rawIcon) return 'icon-unknown';

  let code = String(rawIcon).toLowerCase().trim();
  if (code.includes('?')) code = code.split('?')[0];
  code = code.replace(/_/g, '-').replace(/\s+/g, '-');

  const owmMatch = code.match(/^0?([0-9]{1,2})([dn])$/);
  if (owmMatch) {
    const num = owmMatch[1].padStart(2, '0');
    const night = owmMatch[2] === 'n';
    switch (num) {
      case '01': return night ? 'icon-clear-night' : 'icon-clear-day';
      case '02': return night ? 'icon-few-clouds-night' : 'icon-few-clouds-day';
      case '03': return 'icon-scattered-clouds';
      case '04': return 'icon-broken-clouds';
      case '09': return 'icon-drizzle';
      case '10': return 'icon-rain';
      case '11': return 'icon-thunder-rain';
      case '13': return 'icon-snow';
      case '50': return 'icon-mist';
      default: return 'icon-unknown';
    }
  }

  const explicitNight = /\bnight$|\bnight\b|n$/.test(code);
  const night = explicitNight || isNightGuess;
  if (code === 'skc' || code === 'sunny' || code === 'clear') return night ? 'icon-clear-night' : 'icon-clear-day';
  if (code === 'few' || code === 'sct' || code === 'partly-cloudy' || code.includes('partly')) return night ? 'icon-few-clouds-night' : 'icon-few-clouds-day';
  if (code.includes('scattered-cloud')) return 'icon-scattered-clouds';
  if (code.includes('broken') || code === 'bkn') return 'icon-broken-clouds';
  if (code.includes('overcast') || code === 'ovc') return 'icon-overcast';
  if (code.includes('drizzle')) return 'icon-drizzle';
  if (code.includes('rain-showers') || code.includes('rain_showers') || code.includes('showers')) return 'icon-light-rain';
  if (code.includes('shower') && code.includes('rain')) return 'icon-shower-rain';
  if (code.includes('rain')) return 'icon-rain';
  if (code.includes('heavy')) return 'icon-heavy-rain';
  if (code.includes('sleet') || code.includes('ice')) return 'icon-sleet';
  if (code.includes('mix') || code.includes('rain-snow')) return 'icon-rain-snow';
  if (code.includes('snow')) return 'icon-snow';
  if (code.includes('thunder') || code.includes('tsra') || code.includes('tstorm')) return code.includes('rain') ? 'icon-thunder-rain' : 'icon-thunder';
  if (code.includes('mist')) return 'icon-mist';
  if (code.includes('fog')) return 'icon-fog';
  if (code.includes('haze')) return 'icon-haze';
  if (code.includes('dust')) return 'icon-dust';
  if (code.includes('smoke')) return 'icon-smoke';
  if (code.includes('squall')) return 'icon-squall';
  if (code.includes('tornado')) return 'icon-tornado';

  return 'icon-unknown';
}

function renderForecast7(forecast) {
  const fl = document.getElementById('forecastList');
  if (!fl) return;

  fl.innerHTML = '';

  const daily = (forecast && Array.isArray(forecast.daily))
    ? forecast.daily.slice(0, 7)
    : [];

  if (!daily.length) {
    const placeholder = document.createElement('div');
    placeholder.className = 'fcard';
    placeholder.innerHTML = `<div style="font-size:13px;color:var(--muted)">Forecast unavailable</div>`;
    fl.appendChild(placeholder);
    return;
  }

  daily.forEach(d => {
    const ts = d.dt || d.date || d.time || d.timestamp;
    const weekday = ts
      ? new Date(ts < 1e12 ? ts * 1000 : ts).toLocaleDateString([], { weekday: 'short' })
      : '';

    let maxF = null;
    if (d.max != null) maxF = Math.round(d.max);
    else if (d.max_c != null) maxF = Math.round(d.max_c * 9/5 + 32);

    let minF = null;
    if (d.min != null) minF = Math.round(d.min);
    else if (d.min_c != null) minF = Math.round(d.min_c * 9/5 + 32);

    const maxText = maxF != null ? `${maxF}°` : '—';
    const minText = minF != null ? `${minF}°` : '—';

    const forecastDate = ts ? new Date(ts < 1e12 ? ts * 1000 : ts) : null;
    const now = new Date();
    let isNightGuess = false;
    if (forecastDate && forecastDate.toDateString() === now.toDateString()) {
      const sunriseTs = window.__lastKioskData?.tides?.sunrise;
      const sunsetTs = window.__lastKioskData?.tides?.sunset;
      const sunrise = sunriseTs ? new Date(sunriseTs) : null;
      const sunset = sunsetTs ? new Date(sunsetTs) : null;
      if (sunrise && sunset) {
        isNightGuess = now < sunrise || now >= sunset;
      } else {
        const hour = now.getHours();
        isNightGuess = hour < 6 || hour >= 18;
      }
    }

    const iconId = mapForecastIconId(d.icon, isNightGuess);
    const iconSvg = getIconSvg(iconId, { width: '28', height: '28' }) || getIconSvg('icon-unknown', { width: '28', height: '28' });

    const card = document.createElement('div');
    card.className = 'fcard';
    card.innerHTML = `
      <div style="font-weight:700;font-size:14px;margin-right:10px">${weekday}</div>
      <div class="forecastIcon" style="display:flex;align-items:center;margin-right:6px">${iconSvg}</div>
      <div style="font-size:15px">
        <strong>${maxText}</strong><span style="font-size:12px;opacity:0.7">/${minText}</span>
      </div>
    `;
    fl.appendChild(card);
  });
}


  async function fetchKiosk(){

    try {
      const res = await fetch(WORKER_URL.replace(/\/$/,'') + '/api/kiosk?cachebust=' + Math.floor(Math.random()*1e6));
      if (!res.ok) throw new Error('Worker fetch failed: ' + res.status);
      const data = await res.json();

      // Fetch history data for sparkline
      let historyData = null;
      try {
        const historyRes = await fetch(WORKER_URL.replace(/\/$/,'') + '/api/history?cachebust=' + Math.floor(Math.random()*1e6));
        if (historyRes.ok) {
          historyData = await historyRes.json();
        }
      } catch (historyErr) {
        console.warn('History fetch failed:', historyErr);
      }

      window.__lastKioskData = data;
      console.log('kiosk payload (saved to window.__lastKioskData):', data);
      console.log('history payload:', historyData);
      console.log('icon candidates:', data.weather?.icon, data.weather?.condition_icon, data.weather?.weather?.[0]?.icon, data.weather?.description);

      setText('updatedText', new Date().toLocaleTimeString());
      const w = data.weather || {};

      // Update Dashboard Header based on source
      const headerEl = document.getElementById('dashboardHeader');
      const source = w.source || '';
      if (headerEl) {
        if (source === 'Weather Underground') {
          headerEl.textContent = 'Orrs Hill Weather Station (KMEHARPS13)';
        } else if (source === 'Acuparse') {
          headerEl.textContent = 'Orrs Hill Weather Station (AcuPulse)';
          headerEl.textContent = 'Orrs Hill Weather Station (Acuparse)';
        } else if (source === 'OpenWeather') {
          headerEl.textContent = 'OpenWeather (Harpswell)';
        }
      }

      let airTempFnum = null;
      if (w.temp_c !== null && w.temp_c !== undefined) airTempFnum = cToF(w.temp_c);
      else if (w.temp_f !== null && w.temp_f !== undefined) airTempFnum = Number(w.temp_f);
      setText('airTempNum', airTempFnum !== null ? airTempFnum.toFixed(1) : '—');

      const shortDesc = (w.summary || w.description || '') || '';
      setText('conditionText', shortDesc || '—');

      const feelsF = (w.feels_c !== null && w.feels_c !== undefined) ? cToF(w.feels_c) : (airTempFnum !== null ? airTempFnum : null);
      const feelsEl = document.getElementById("feelsLikeUnder");
if (feelsF !== null) {
  feelsEl.textContent = `Feels like ${feelsF.toFixed(1)}°F`;
} else {
  feelsEl.textContent = "";
}


const iconCandidate = data.weather?.icon || data.weather?.icon_code || data.weather?.condition_icon || (data.weather?.weather && data.weather.weather[0] && data.weather.weather[0].icon) || null;

let codeFromIcon = null;
if (iconCandidate) {
  switch (iconCandidate.slice(0,2)) {
    case '01': codeFromIcon = 800; break;
    case '02': codeFromIcon = 801; break;
    case '03': codeFromIcon = 802; break;
    case '04': codeFromIcon = 803; break;
    case '09': codeFromIcon = 521; break;
    case '10': codeFromIcon = 500; break;
    case '11': codeFromIcon = 200; break;
    case '13': codeFromIcon = 600; break;
    case '50': codeFromIcon = 701; break;
    default: codeFromIcon = null;
  }
}

// Optional: apply inside a frame to avoid race overwrites
requestAnimationFrame(() => setConditionIcon(codeFromIcon, iconCandidate));



      const tempContainer = document.getElementById('airTemp');
      if (airTempFnum !== null && !isNaN(airTempFnum) && tempContainer) {
        let color = '#39a0ff';
        if (airTempFnum >= 80) color = '#ff8c42';
        else if (airTempFnum >= 40) color = '#2aa876';
        else if (airTempFnum >= 33) color = '#6ec6ff';
        tempContainer.style.color = color;
      }

// Wind speed (KPH → MPH)
const windKph = w.wind_kph || w.wind_kph_avg || w.wind_kph_avg_10m || null;
const windMphNum = isFinite(windKph) ? mphFromKph(windKph) : null;

// Update speed number
document.getElementById("windSpeedNumber").textContent =
  isFinite(windMphNum) ? `${Math.round(windMphNum)}` : '—';

// Update unit label
document.getElementById("windSpeedUnit").textContent =
  isFinite(windMphNum) ? `mph` : '';


// Gusts (KPH → MPH)
const gustKph = w.gust_kph || w.wind_gust_kph || null;
const gustMphNum = isFinite(gustKph) ? mphFromKph(gustKph) : null;

// Update gust text
const gustEl = document.getElementById("windGustText");

if (isFinite(gustMphNum) && isFinite(windMphNum) && gustMphNum > windMphNum) {
  gustEl.textContent = `Gust ${Math.round(gustMphNum)}`;
  gustEl.style.display = 'block';
} else {
  gustEl.textContent = '';
  gustEl.style.display = 'none';
}



const dirDeg = (w.wind_dir_deg !== undefined && w.wind_dir_deg !== null)
  ? Number(w.wind_dir_deg)
  : null;

setText('windDir', dirDeg !== null ? dirDeg + '°' : '—');

// Update wind history from API if available (limited to last 2 hours)
if (historyData && Array.isArray(historyData.wind_dir_last4h)) {
  const twoHoursAgo = Math.floor(Date.now() / 1000) - (2 * 3600);
  windDirHistory = historyData.wind_dir_last4h
    .filter(item => Number(item.t) >= twoHoursAgo)
    .map(item => Number(item.d))
    .filter(d => !isNaN(d) && d >= 0);
  console.log('Wind history updated from API (last 2h). Count:', windDirHistory.length, 'Data:', windDirHistory);
} else if (typeof dirDeg === 'number' && !isNaN(dirDeg)) {
  // Fallback: maintain local history if API data is missing (approx 2 hours at 5 min intervals)
  windDirHistory.push(dirDeg % 360);
  if (windDirHistory.length > 24) windDirHistory.shift();
  console.log('Wind history updated locally (API data not available). Count:', windDirHistory.length);
}

// Update needle position
if (typeof dirDeg === 'number' && !isNaN(dirDeg)) {
  setCompassDirection(dirDeg, windMphNum, gustMphNum);
}

// Update the density arc (safe even if history is empty)
console.log('Calling updateWindHistoryArc with windDirHistory (length:', windDirHistory.length, ')');
updateWindHistoryArc();


      // Ocean / buoy: show swell and sea temp with a 1-hour history fallback for missing (MM) readings
      const ocean = data.ocean || {};
      const hist = data.station?.history || [];
      const now = Date.now();
      const oneHour = 3600000;

      const getBuoyVal = (curr, keys) => {
        if (curr !== null && curr !== undefined) return curr;
        if (!Array.isArray(hist)) return null;
        // Iterate history from most recent to oldest
        const recent = [...hist].sort((a,b) => toMs(b.ts || b.time || b.timestamp) - toMs(a.ts || a.time || a.timestamp));
        for (const e of recent) {
          const t = toMs(e.ts || e.time || e.timestamp);
          if (!t || (now - t) > oneHour) continue;
          for (const k of keys) {
            const v = safeNum(e[k]);
            if (v !== null) return v;
          }
        }
        return null;
      };

      const swellH = getBuoyVal(ocean.combined_wave_m, ['combined_wave_m']);
      setText('swellHeight', swellH !== null ? (swellH / 0.3048).toFixed(1) + ' ft' : '—');

      // Update Wave Icon based on steepness
      const steepness = (ocean.steepness || '').toLowerCase();
      const wIcoEl = document.getElementById('waveIcon');
      if (wIcoEl) {
        let iconId = 'icon-wave-average';
        if (steepness.includes('very')) iconId = 'icon-wave-very-steep';
        else if (steepness.includes('steep')) iconId = 'icon-wave-steep';
        else if (steepness.includes('swell')) iconId = 'icon-wave-swell';
        wIcoEl.querySelector('use').setAttribute('href', '#' + iconId);
      }

      const swellP = getBuoyVal(ocean.wave_period_s, ['wave_period_s']);
      const pEl = document.getElementById('swellPeriod');
      if (pEl) {
        pEl.textContent = swellP !== null ? `Period: ${Number(swellP).toFixed(1)} s` : '—';
      }

      setText('waveSource', ocean.wave_source || ocean.source || '—');

      const sTemp = getBuoyVal(ocean.sea_temp_c, ['sea_temp_c']);
      setText('seaTemp', sTemp !== null ? cToF(sTemp).toFixed(1) + '°F' : '—');
      setText('seaSource', ocean.sea_source || ocean.source || '—');

      if (ocean.visibility_km !== null && ocean.visibility_km !== undefined) {
        const visMi = ocean.visibility_km / 1.60934;
        const visLabel = visMi >= 10 ? '10+ mi' : `${visMi.toFixed(1)} mi`;
        setText('visibility', visLabel);
      } else setText('visibility','—');
      setText('buoySource', ocean.visibility_source || ocean.source || '—');

      const rainVal = (data.rain_today_in !== undefined) ? data.rain_today_in : (data.weather?.rain_mm_1h ? (data.weather.rain_mm_1h / 25.4) : 0);
      updateRainGauge(rainVal || 0);

      // 30-Day Rain Update
      if (historyData && Array.isArray(historyData.precip_last30)) {
        const total30 = historyData.precip_last30.reduce((acc, d) => acc + (Number(d.rain_in) || 0), 0);
        const r30Fill = document.getElementById('rain30Fill');
        const r30Val = document.getElementById('rain30Val');
        const r30Status = document.getElementById('rain30Status');
        
        if (r30Fill && r30Val) {
          const pct30 = Math.min(100, (total30 / 7) * 100);
          r30Fill.style.height = pct30 + '%';
          r30Val.textContent = total30.toFixed(1) + '"';
          
          let color = '#1fb6b6'; // Default Normal
          let statusTxt = 'NORMAL';
          
          if (total30 <= 1) { color = '#a67c52'; statusTxt = 'V. DRY'; }
          else if (total30 <= 3) { color = '#ffd166'; statusTxt = 'DRY'; }
          else if (total30 <= 5) { color = '#1fb6b6'; statusTxt = 'NORMAL'; }
          else if (total30 <= 6) { color = '#39a0ff'; statusTxt = 'WET'; }
          else { color = '#0288d1'; statusTxt = 'V. WET'; }
          
          r30Fill.style.backgroundColor = color;
          if (r30Status) r30Status.textContent = statusTxt;
        }
      }



            // Forecast list (7‑day bar with icons)
      renderForecast7(data.forecast);


      // Tides
      const tides = data.tides || {};
      lastSunrise = tides.sunrise;
      lastSunset = tides.sunset;
      const highs = tides.highs || [];
      const lows = tides.lows || [];
      const samplesArr = tides.samples || [];
      let nextHL = '—';
      const nowTs3 = Date.now();
      const candidatesHL = [];
      (highs||[]).forEach(h=>{ if (h.ts && toMs(h.ts) > nowTs3) candidatesHL.push({type:'H', ts:toMs(h.ts), height:h.height}); });
      (lows||[]).forEach(l=>{ if (l.ts && toMs(l.ts) > nowTs3) candidatesHL.push({type:'L', ts:toMs(l.ts), height:l.height}); });
      candidatesHL.sort((a,b)=>a.ts-b.ts);
      if (candidatesHL.length){ const n = candidatesHL[0]; nextHL = `${new Date(n.ts).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})} ${n.type} ${(n.height/0.3048).toFixed(2)} ft`; }
      setText('tideSummary','Next: ' + nextHL);

      drawTideChart(samplesArr || [], highs || [], lows || [], tides.sunrise, tides.sunset);

      // Temp sparkline
      const nowTs = Date.now();
      const tryArrays = [
        // Priority 1: History API temperature data
        (historyData && Array.isArray(historyData.temp_last12)) ? historyData.temp_last12.map(item => ({ ts: item.t, temp_c: item.c })) : null,
        // Fallback sources
        (data.weather && Array.isArray(data.weather.observations)) ? data.weather.observations : null,
        (data.weather && Array.isArray(data.weather.hourly)) ? data.weather.hourly : null,
        (data.forecast && Array.isArray(data.forecast.hourly)) ? data.forecast.hourly : null,
        (data.station && Array.isArray(data.station.history)) ? data.station.history : null
      ];
      function normalizeTs(v){ const n = safeNum(v); if (n === null) return null; return n < 1e12 ? n * 1000 : n; }
      let chosenSamples = [];
      for (const arr of tryArrays){
        if (!arr || !arr.length) continue;
        const s = [];
        for (let i=0;i<arr.length;i++){
          const item = arr[i];
          const ts = normalizeTs(item.ts ?? item.time ?? item.timestamp);
          if (!ts) continue;
          let f = null;
          if (safeNum(item.temp_f) !== null) f = safeNum(item.temp_f);
          else if (safeNum(item.temp_c) !== null) f = safeNum(item.temp_c) * 9/5 + 32;
          else if (safeNum(item.temp) !== null) f = safeNum(item.temp);
          if (f === null) continue;
          s.push({ ts, f: Number(f) });
        }
        if (s.length){ chosenSamples = s.sort((a,b)=>a.ts-b.ts); break; }
      }
      if (!chosenSamples.length && Array.isArray(data.forecast?.daily) && data.forecast.daily.length){
        const daily = data.forecast.daily[0];
        const currentC = (data.weather && safeNum(data.weather.temp_c) !== null) ? safeNum(data.weather.temp_c) : null;
        const baseC = currentC !== null ? currentC : (safeNum(daily.min_c) !== null && safeNum(daily.max_c) !== null ? (safeNum(daily.min_c) + safeNum(daily.max_c)) / 2 : 10);
        for (let i=24;i>=0;i--) chosenSamples.push({ ts: nowTs - i*3600*1000, f: baseC * 9/5 + 32 + (Math.random()-0.5)*1.5 });
      }
      if (!chosenSamples.length){
        const curF = (data.weather && safeNum(data.weather.temp_f) !== null) ? safeNum(data.weather.temp_f) : null;
        const curC = (data.weather && safeNum(data.weather.temp_c) !== null) ? safeNum(data.weather.temp_c) : null;
        const baseF = curF !== null ? curF : (curC !== null ? curC * 9/5 + 32 : 50);
        for (let i=24;i>=0;i--) chosenSamples.push({ ts: nowTs - i*3600*1000, f: baseF });
      }
      const windowStart = nowTs - 12 * 3600 * 1000;
      const windowEnd = nowTs;
      const resampled = resampleToWindow(chosenSamples, windowStart, windowEnd, 13);
      lastSparkPoints = resampled;

      setTimeout(() => { drawTempSparkline(resampled, lastSunrise, lastSunset); autoAlignTempUnit(); }, 80);
      console.log('Chosen samples for sparkline:', chosenSamples); // Log chosen samples for debugging

      await updateRightSide(data, historyData);

    } catch (err) {
      console.warn('fetchKiosk failed', err);
      setText('updatedText','Error');
    }
  }
  // -------------------------
  // INIT
  // -------------------------
  window.addEventListener('load', () => {
    renderGaugeTicks();
    renderCompassTicks();
    renderPressureTicks();
    updateRainGauge(0);
    setCompassDirection(null, null, null);
    fetchKiosk();
    setTimeout(() => { autoAlignTempUnit(); }, 250);
    setInterval(fetchKiosk, 5 * 60 * 1000);
  });
  window.addEventListener('resize', () => { drawTempSparkline(lastSparkPoints, lastSunrise, lastSunset); autoAlignTempUnit(); });

  </script>
